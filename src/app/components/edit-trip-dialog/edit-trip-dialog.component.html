<h2 mat-dialog-title>
    <mat-icon>edit</mat-icon>
    Edit Trip
</h2>

<mat-dialog-content>
    <form [formGroup]="form" class="edit-form">
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Trip Title</mat-label>
            <input matInput formControlName="title" placeholder="My Amazing Trip">
            <mat-error *ngIf="form.get('title')?.hasError('required')">Title is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" rows="3" placeholder="Describe your trip..."></textarea>
        </mat-form-field>

        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Origin</mat-label>
                <input matInput formControlName="origin" placeholder="Where from?">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Destination</mat-label>
                <input matInput formControlName="destination" placeholder="Where to?">
            </mat-form-field>
        </div>

        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Start Date</mat-label>
                <input matInput [matDatepicker]="startPicker" formControlName="startDate">
                <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
                <mat-datepicker #startPicker></mat-datepicker>
                <mat-error *ngIf="form.get('startDate')?.hasError('required')">Start date is required</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>End Date</mat-label>
                <input matInput [matDatepicker]="endPicker" formControlName="endDate">
                <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
                <mat-datepicker #endPicker></mat-datepicker>
                <mat-error *ngIf="form.get('endDate')?.hasError('required')">End date is required</mat-error>
            </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Cover Image URL</mat-label>
            <input matInput formControlName="coverImage" placeholder="https://...">
        </mat-form-field>

        <div class="toggle-row">
            <mat-slide-toggle formControlName="isPublic">Make trip public</mat-slide-toggle>
        </div>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="onSave()" [disabled]="form.invalid">
        Save Changes
    </button>
</mat-dialog-actions>
