<div class="chat-panel" [class.open]="isOpen">
    <!-- Header -->
    <div class="chat-header">
        <div class="header-title">
            <mat-icon>auto_awesome</mat-icon>
            <span>AI Trip Assistant</span>
        </div>
        <button mat-icon-button (click)="onClose()">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <!-- Messages -->
    <div class="chat-messages" #chatMessages>
        <!-- Welcome Message -->
        <div class="welcome-message" *ngIf="messages.length === 0">
            <mat-icon class="welcome-icon">auto_awesome</mat-icon>
            <h3>Modify your itinerary with AI</h3>
            <p>Tell me what changes you'd like to make to your trip. For example:</p>
            <div class="suggestion-chips">
                <button class="chip" *ngFor="let suggestion of suggestions" (click)="sendMessage(suggestion)">
                    {{ suggestion }}
                </button>
            </div>
        </div>

        <!-- Chat Messages -->
        <div *ngFor="let msg of messages" class="message" [class.user]="msg.role === 'user'"
            [class.assistant]="msg.role === 'assistant'">
            <div class="message-bubble">
                <mat-icon class="avatar" *ngIf="msg.role === 'assistant'">auto_awesome</mat-icon>
                <div class="message-content">
                    <p>{{ msg.content }}</p>
                    <div class="changes-list" *ngIf="msg.changesSummary?.length">
                        <span class="changes-label">Changes made:</span>
                        <ul>
                            <li *ngFor="let change of msg.changesSummary">{{ change }}</li>
                        </ul>
                    </div>
                </div>
            </div>
            <span class="timestamp">{{ msg.timestamp | date:'shortTime' }}</span>
        </div>

        <!-- Typing Indicator -->
        <div class="message assistant" *ngIf="isProcessing">
            <div class="message-bubble">
                <mat-icon class="avatar">auto_awesome</mat-icon>
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Suggestion Chips (shown after messages too) -->
    <div class="bottom-suggestions" *ngIf="messages.length > 0 && !isProcessing">
        <button class="chip small" *ngFor="let suggestion of suggestions.slice(0, 3)" (click)="sendMessage(suggestion)">
            {{ suggestion }}
        </button>
    </div>

    <!-- Input Area -->
    <div class="chat-input">
        <textarea [(ngModel)]="newMessage" (keydown)="onKeydown($event)" placeholder="Ask AI to modify your itinerary..."
            rows="1" [disabled]="isProcessing"></textarea>
        <button mat-icon-button color="primary" (click)="sendMessage()" [disabled]="!newMessage.trim() || isProcessing">
            <mat-icon>send</mat-icon>
        </button>
    </div>
</div>
