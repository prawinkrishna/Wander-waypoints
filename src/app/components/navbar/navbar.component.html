<nav class="navbar">
  <div class="navbar-left">
    <a routerLink="/home" class="logo-link">
      <mat-icon class="logo-icon">explore</mat-icon>
      <span class="site-name">Wander</span>
    </a>
  </div>

  <div class="navbar-center">
    <a mat-button routerLink="/home" routerLinkActive="active-link">
      <mat-icon>home</mat-icon>
      <span>Home</span>
    </a>
    <a mat-button routerLink="/trip-feed" routerLinkActive="active-link">
      <mat-icon>map</mat-icon>
      <span>Trips</span>
    </a>
    <a mat-button routerLink="/ai-planner" routerLinkActive="active-link">
      <mat-icon>auto_awesome</mat-icon>
      <span>AI Planner</span>
    </a>
  </div>

  <div class="navbar-right">
    <mat-form-field appearance="outline" class="search-bar" subscriptSizing="dynamic">
      <input matInput type="text" placeholder="Search places..." [formControl]="searchControl"
        [matAutocomplete]="auto" />
      <mat-icon matPrefix>search</mat-icon>
      <mat-autocomplete #auto="matAutocomplete" [displayWith]="displayFn" (optionSelected)="onOptionSelected($event)"
        class="search-autocomplete">
        <mat-option *ngFor="let option of filteredOptions" [value]="option" class="search-option-item">
          <div class="option-content">
            <div class="option-title">
              {{ option.raw?.address?.amenity || option.raw?.address?.shop || option.raw?.address?.tourism ||
              option.label.split(',')[0] }}
            </div>
            <div class="option-subtitle">
              {{ option.label }}
            </div>
          </div>
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>

    <!-- Guest User: Show Login/Sign Up -->
    <ng-container *ngIf="isGuest">
      <button mat-stroked-button class="login-btn" (click)="onLogin()">
        Login
      </button>
      <button mat-flat-button color="primary" class="signup-btn" routerLink="/login" [queryParams]="{mode: 'register'}">
        Sign Up
      </button>
    </ng-container>

    <!-- Authenticated User: Show notifications and profile -->
    <ng-container *ngIf="!isGuest">
      <button mat-icon-button aria-label="Notifications">
        <mat-icon [matBadge]="3" matBadgeColor="warn" matBadgeSize="small">notifications</mat-icon>
      </button>

      <button mat-icon-button [matMenuTriggerFor]="userMenu" class="avatar-btn">
        <img *ngIf="currentUser?.profileImage" [src]="currentUser.profileImage" class="user-avatar">
        <mat-icon *ngIf="!currentUser?.profileImage">account_circle</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <button mat-menu-item routerLink="/profile">
          <mat-icon>person</mat-icon>
          <span>Profile</span>
        </button>
        <button mat-menu-item routerLink="/booking">
          <mat-icon>book_online</mat-icon>
          <span>Bookings</span>
        </button>
        <button mat-menu-item routerLink="/settings">
          <mat-icon>settings</mat-icon>
          <span>Settings</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="onLogout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </ng-container>
  </div>
</nav>
