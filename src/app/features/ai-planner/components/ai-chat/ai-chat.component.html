<div class="chat-layout">
    <header class="chat-header">
        <h1>AI Concierge</h1>
        <button mat-icon-button routerLink="/home">
            <mat-icon>close</mat-icon>
        </button>
    </header>

    <div class="chat-content">
        <div class="chat-messages" #scrollContainer>
            <div *ngFor="let msg of messages" [class.user-msg]="msg.isUser" [class.ai-msg]="!msg.isUser">
                <div class="message-bubble" *ngIf="msg.type === 'text'">
                    {{ msg.text }}
                </div>

                <!-- Trip Card Display REMOVED - using Trip Canvas -->

            </div>
            <div *ngIf="isLoading" class="ai-msg">
                <div class="message-bubble typing-indicator">
                    <span>.</span><span>.</span><span>.</span>
                </div>
            </div>
        </div>
    </div>

    <footer class="chat-footer">
        <div class="input-area">
            <input type="text" placeholder="Plan a trip to..." [(ngModel)]="userInput" (keyup.enter)="sendMessage()">
            <button mat-icon-button color="primary" (click)="sendMessage()">
                <mat-icon>send</mat-icon>
            </button>
        </div>
    </footer>
</div>
